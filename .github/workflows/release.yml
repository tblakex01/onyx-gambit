name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to package and publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  package-macos:
    name: Package macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Intel
            runner: macos-13
          - label: Apple Silicon
            runner: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Stockfish execute permissions
        run: chmod +x resources/stockfish/darwin-arm64/stockfish resources/stockfish/darwin-x64/stockfish

      - name: Run packaged smoke test
        run: npm run test:packaged-smoke

      - name: Build distributables
        run: npm run package:mac

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.label }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - package-macos

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
