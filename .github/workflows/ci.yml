name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify macOS desktop app
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Stockfish execute permissions
        run: chmod +x resources/stockfish/darwin-arm64/stockfish resources/stockfish/darwin-x64/stockfish

      - name: Run unit and integration tests
        run: npm run test:unit

      - name: Run Electron end-to-end regression suite
        run: npm run test:e2e

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: qa-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/qa/**/*.png
